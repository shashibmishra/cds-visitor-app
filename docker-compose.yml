version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: visitor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - visitor-network

  app:
    build: .
    container_name: visitor-app
    ports:
      - "5001:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - visitor-network

networks:
  visitor-network:
    driver: bridge
